name: Deploy Fly Light with Secure Configuration

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # ✅ CRITICAL FIX: environment INSIDE the job
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # ✅ استخدام أسماء الـ secrets الفعلية عندك
      - name: Inject Secrets into Files
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ADMIN_PASS: ${{ secrets.ADMIN_PASS }}
        run: |
          echo "🔐 Injecting secure configuration..."
          
          # تحديث supabase.js
          if [ -f "supabase.js" ]; then
            sed -i "s|PLACEHOLDER_SUPABASE_URL|${SUPABASE_URL}|g" supabase.js
            sed -i "s|PLACEHOLDER_SUPABASE_KEY|${SUPABASE_KEY}|g" supabase.js
            echo "✅ supabase.js configured"
          fi
          
          # تحديث script.js
          if [ -f "script.js" ]; then
            sed -i "s|PLACEHOLDER_ADMIN_PASS|${ADMIN_PASS}|g" script.js
            echo "✅ script.js configured"
          fi
          
          echo "✅ All secrets injected successfully"
      
      - name: Verify No Placeholders Remain
        run: |
          echo "🔍 Verifying configuration..."
          
          if grep -r "PLACEHOLDER_SUPABASE_URL" . --include="*.js" --exclude-dir=.git --exclude-dir=node_modules 2>/dev/null; then
            echo "❌ ERROR: SUPABASE_URL placeholder still present!"
            exit 1
          fi
          
          if grep -r "PLACEHOLDER_SUPABASE_KEY" . --include="*.js" --exclude-dir=.git --exclude-dir=node_modules 2>/dev/null; then
            echo "❌ ERROR: SUPABASE_KEY placeholder still present!"
            exit 1
          fi
          
          if grep -r "PLACEHOLDER_ADMIN_PASS" . --include="*.js" --exclude-dir=.git --exclude-dir=node_modules 2>/dev/null; then
            echo "❌ ERROR: ADMIN_PASS placeholder still present!"
            exit 1
          fi
          
          echo "✅ Configuration verified - all placeholders replaced"
      
      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: Deployment Summary
        run: |
          echo "=========================================="
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "=========================================="
          echo "📦 Build: Complete"
          echo "🔐 Secrets: Securely injected"
          echo "🌐 Pages URL: ${{ steps.deployment.outputs.page_url }}"
          echo "⏰ Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="

  security-check:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Security Verification
        run: |
          echo "🔐 Running security verification..."
          echo ""
          
          FOUND_ISSUES=0
          
          # Check for placeholders
          if grep -r "PLACEHOLDER_SUPABASE" . --include="*.js" --include="*.html" --exclude-dir=.git --exclude-dir=node_modules 2>/dev/null; then
            echo "⚠️  WARNING: PLACEHOLDER values found in code"
            FOUND_ISSUES=1
          fi
          
          # Check for hardcoded URLs
          if grep -r "https://.*\.supabase\.co" . --include="*.js" --include="*.html" --exclude-dir=.git --exclude-dir=node_modules 2>/dev/null | grep -v "PLACEHOLDER"; then
            echo "⚠️  WARNING: Real Supabase URL found"
            FOUND_ISSUES=1
          fi
          
          # Check for JWT tokens
          if grep -r "eyJ" . --include="*.js" --include="*.html" --exclude-dir=.git --exclude-dir=node_modules 2>/dev/null; then
            echo "⚠️  WARNING: Potential secret key pattern found"
            FOUND_ISSUES=1
          fi
          
          echo ""
          if [ $FOUND_ISSUES -eq 0 ]; then
            echo "✅ Security check PASSED"
            echo "✅ No hardcoded secrets found"
          else
            echo "⚠️  Review security warnings above"
          fi
