name: Deploy
on:
  push:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Secrets
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_KEY }}
          PASS: ${{ secrets.ADMIN_PASS }}
        run: |
          sed -i "s|PLACEHOLDER_SUPABASE_URL|${URL}|g" supabase.js
          sed -i "s|PLACEHOLDER_SUPABASE_ANON_KEY|${KEY}|g" supabase.js
          sed -i "s|PLACEHOLDER_ADMIN_PASSWORD|${PASS}|g" script.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
        id: deployment
