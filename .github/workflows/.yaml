- name: Checkout Repository
        uses: actions/checkout@v4

      # ⬇️ أضف هذه الخطوة هنا تماماً ⬇️
      - name: Inject Supabase Credentials
        run: |
          sed -i 's/YOUR_PROJECT_ID/${{ secrets.SUPABASE_PROJECT_ID }}/g' supabase.js
          sed -i 's/YOUR_ANON_KEY/${{ secrets.SUPABASE_ANON_KEY }}/g' supabase.js

      # خطوة النشر الخاصة بك ستكون هنا (مثال: GitHub Pages أو Vercel إلخ)
